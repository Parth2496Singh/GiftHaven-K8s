apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gift-ai-hpa
  namespace: gift-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gift-ai-deployment
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
